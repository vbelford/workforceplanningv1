<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .chip { transition: transform .12s ease, box-shadow .12s ease; cursor: grab; }
  .chip:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(20,36,74,.22); }
  .chip.dragging { opacity: .35; }
  .cell-drop { transition: background-color .12s ease; }
  .cell-drop.drag-over { background-color: rgba(231,33,117,0.10); }
  .step-panel { animation: fadein .18s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
  .lever-col::-webkit-scrollbar { width: 5px; }
</style>
</head>
<body class="bg-slate-50 text-[#14244A] antialiased">

<div class="flex min-h-screen">

          <button onclick="toggleAddLeaderForm(false)" class="flex-1 py-1.5 text-xs font-medium bg-white text-[#14244A] rounded-lg hover:bg-white/70">Cancel</button>
        </div>
      </div>
      <button id="add-leader-btn" onclick="toggleAddLeaderForm(true)" class="w-full flex items-center justify-center gap-1.5 py-2 text-xs font-medium text-[#14244A]/70 border border-dashed border-[#14244A]/30 rounded-lg hover:border-[#14244A]/60 hover:text-[#14244A]">
        <span class="text-base leading-none">+</span> Add Org Leader
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">

    <header class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="header-avatar" class="w-10 h-10 rounded-full flex items-center justify-center font-semibold text-sm"></div>
        <div>
          <h1 id="header-name" class="text-lg font-bold text-[#14244A] leading-tight"></h1>
          <p id="header-title" class="text-xs text-slate-500"></p>
        </div>
      </div>
      <button onclick="window.print()" class="px-4 py-2 text-xs font-semibold bg-[#E72175] text-white rounded-lg hover:opacity-90">Export Session</button>
    </header>

    <div class="bg-white border-b border-slate-200 px-8">
      <div class="flex gap-1" id="step-tabs"></div>
    </div>

    <main class="flex-1 overflow-y-auto px-8 py-6" id="step-content"></main>

    <footer class="bg-white border-t border-slate-200 px-8 py-4">
      <div class="flex items-center justify-between cursor-pointer" onclick="toggleDrawer()">
        <h2 class="text-sm font-bold text-[#14244A]">Live Summary — <span id="summary-leader-name"></span></h2>
        <button id="drawer-toggle-btn" class="text-xs font-medium text-slate-500 hover:text-[#14244A]">Hide ▲</button>
      </div>
      <div id="drawer-body" class="mt-3">
        <div class="grid grid-cols-4 gap-3 mb-4" id="summary-counts"></div>
        <div class="border border-slate-200 rounded-xl overflow-hidden">
          <table class="w-full text-xs">
            <thead class="bg-slate-50 text-slate-500">
              <tr class="text-left">
                <th class="py-2 px-3 font-semibold">Category</th>
                <th class="py-2 px-3 font-semibold">Item</th>
                <th class="py-2 px-3 font-semibold">Detail</th>
                <th class="py-2 px-3 font-semibold">Reference</th>
                <th class="py-2 px-3 font-semibold">Budget Range</th>
              </tr>
            </thead>
            <tbody id="summary-body"></tbody>
          </table>
        </div>
      </div>
    </footer>
  </div>
</div>

function leader() { return state.leaders[currentLeaderId]; }

function initials(name){ return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

function renderLeaderNav(){
  const nav = document.getElementById('leader-nav');
  nav.innerHTML = '';
  state.order.forEach(id => {
    const l = state.leaders[id];
    const active = id === currentLeaderId;
    const btn = document.createElement('button');
    btn.className = `w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-left border-l-2 ${active ? 'bg-white/70 border-[#14244A]' : 'border-transparent hover:bg-white/40'}`;
    btn.innerHTML = `
      <span class="w-8 h-8 shrink-0 rounded-full ring-2 ring-white flex items-center justify-center text-xs font-bold ${BRAND[l.color].text}" style="background-color:${BRAND[l.color].hex}">${initials(l.name)}</span>
      <span class="min-w-0">
        <span class="block text-sm font-semibold text-[#14244A] truncate">${l.name}</span>
        <span class="block text-xs text-[#14244A]/60 truncate">${l.title}</span>
      </span>`;
    btn.onclick = () => selectLeader(id);
    nav.appendChild(btn);
  });
}

function toggleAddLeaderForm(show){
  document.getElementById('add-leader-form').classList.toggle('hidden', !show);
  document.getElementById('add-leader-btn').classList.toggle('hidden', show);
}

function submitAddLeader(){
  const name = document.getElementById('new-leader-name').value.trim();
  const title = document.getElementById('new-leader-title').value.trim();
  if(!name || !title){ alert('Enter a name and function/department.'); return; }
  const id = 'leader_' + Date.now();
  const color = leaderColorOrder[state.order.length % leaderColorOrder.length];
  state.leaders[id] = {
    name, title, color,
    companyOKRs: [], teamOKRs: [],
    direction: '', skillTags: [], budgetNote: '',
    employees: [], nextEmployeeId: 1,
    actionItems: [], nextActionId: 1,
    headcount: {baseline:[], wishlist:[], radar:[]}
  };
  state.order.push(id);
  document.getElementById('new-leader-name').value = '';
  document.getElementById('new-leader-title').value = '';
  toggleAddLeaderForm(false);
  selectLeader(id);
}

function selectLeader(id){
  currentLeaderId = id;
  selectedEmployeeId = null;
  currentStep = 1;
  renderAll();
}

const stepDefs = [
  {n:1, label:'Business Context & 6-Mo OKRs'},
  {n:2, label:'Team Health & 9-Box'},
  {n:3, label:"6 B's Talent Strategy"},
  {n:4, label:'Headcount Output'}
];

function renderHeader(){
  const l = leader();
  const avatar = document.getElementById('header-avatar');
  avatar.className = `w-10 h-10 rounded-full flex items-center justify-center font-semibold text-sm ${BRAND[l.color].text}`;
  avatar.style.backgroundColor = BRAND[l.color].hex;
  avatar.textContent = initials(l.name);
  document.getElementById('header-name').textContent = l.name;
  document.getElementById('header-title').textContent = l.title + ' · Headcount Planning Session';
  document.getElementById('summary-leader-name').textContent = l.name;
}

function renderStepTabs(){
  const wrap = document.getElementById('step-tabs');
  wrap.innerHTML = stepDefs.map(s => `
    <button onclick="goStep(${s.n})" class="px-4 py-3 text-sm font-medium border-b-2 -mb-px ${currentStep===s.n ? 'border-[#E72175] text-[#14244A]' : 'border-transparent text-slate-400 hover:text-slate-600'}">
      <span class="inline-flex items-center justify-center w-5 h-5 rounded-full text-xs mr-1.5 ${currentStep===s.n ? 'bg-[#E72175] text-white' : 'bg-slate-100 text-slate-500'}">${s.n}</span>${s.label}
    </button>`).join('');
}

function goStep(n){ currentStep = n; renderStepTabs(); renderStepContent(); }

function renderStepContent(){
  const main = document.getElementById('step-content');
  main.className = 'flex-1 overflow-y-auto px-8 py-6 step-panel';
  if(currentStep===1) main.innerHTML = tplStep1();
  if(currentStep===2) main.innerHTML = tplStep2();
  if(currentStep===3) main.innerHTML = tplStep3();
  if(currentStep===4) main.innerHTML = tplStep4();
  if(currentStep===1) renderSkillTagsInline();
  if(currentStep===2) wireStep2();
}

function tplStep1(){
  const l = leader();
  const okrCard = (title, list, kind, colorKey) => `
    <div class="border rounded-2xl p-5" style="background-color: ${BRAND[colorKey].hex}15; border-color: ${BRAND[colorKey].hex}50">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold text-[#14244A] flex items-center">${dot(colorKey)}${title}</h3>
      </div>
      <div class="space-y-3">
        ${list.map((o,oi) => `
          <div class="border border-slate-200 rounded-xl p-3 bg-white">
            <div class="flex items-start justify-between gap-2">
              <p class="text-sm font-semibold text-[#14244A]">${o.objective}</p>
              <button onclick="removeOKR('${kind}',${oi})" class="text-slate-400 hover:text-[#E72175] text-xs">✕</button>
            </div>
            <ul class="mt-2 space-y-1">
              ${o.krs.map((kr,ki) => `
                <li class="flex items-start gap-2 text-xs text-slate-600">
                  <span class="mt-1 w-1.5 h-1.5 rounded-full shrink-0" style="background:${BRAND[colorKey].hex}"></span>
                  <span class="flex-1">${kr}</span>
                  <button onclick="removeKR('${kind}',${oi},${ki})" class="text-slate-400 hover:text-[#E72175]">✕</button>
                </li>`).join('')}
            </ul>
            <div class="flex gap-1.5 mt-2">
              <input id="${kind}-kr-input-${oi}" placeholder="Add key result..." class="flex-1 text-xs bg-white border border-slate-300 text-[#14244A] placeholder-slate-400 rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-[#E72175]">
              <button onclick="addKR('${kind}',${oi})" class="px-2 py-1 text-xs font-medium bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-100">Add</button>
            </div>
          </div>`).join('') || `<p class="text-xs text-slate-400 italic">No objectives yet.</p>`}
      </div>
      <div class="flex gap-1.5 mt-3">
        <input id="${kind}-obj-input" placeholder="New objective..." class="flex-1 text-xs bg-white border border-slate-300 text-[#14244A] placeholder-slate-400 rounded-lg px-2.5 py-1.5 outline-none focus:ring-2 focus:ring-[#E72175]">
        <button onclick="addOKR('${kind}')" class="px-3 py-1.5 text-xs font-semibold bg-[#E72175] text-white rounded-lg hover:opacity-90">+ Objective</button>
      </div>
    </div>`;

  return `
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-5">
      ${okrCard('Company OKRs — Current Half', l.companyOKRs, 'companyOKRs', 'blue')}
      ${okrCard('Team OKRs — Current Half', l.teamOKRs, 'teamOKRs', 'teal')}
      <div class="border rounded-2xl p-5 space-y-4" style="background-color: ${BRAND.pink.hex}15; border-color: ${BRAND.pink.hex}50">
        <h3 class="text-sm font-bold text-[#14244A] flex items-center">${dot('pink')}Strategic Direction — Next 6 Months</h3>
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Where is the business going over the next 6 months?</label>
          <textarea onchange="updateDirection(this.value)" rows="5" class="mt-1.5 w-full text-sm bg-white border border-slate-300 text-[#14244A] rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-[#E72175] leading-relaxed">${l.direction}</textarea>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Skill shift tags</label>
          <div class="flex flex-wrap gap-1.5 mt-1.5" id="skill-tags"></div>
          <div class="flex gap-1.5 mt-2">
            <input id="skill-input" placeholder="e.g. MLOps" class="flex-1 text-xs bg-white border border-slate-300 text-[#14244A] placeholder-slate-400 rounded-lg px-2.5 py-1.5 outline-none focus:ring-2 focus:ring-[#E72175]">
            <button onclick="addSkillTag()" class="px-3 py-1.5 text-xs font-medium bg-white border border-slate-300 text-slate-600 rounded-lg hover:bg-slate-100">Add</button>
          </div>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide">Budget / constraint note</label>
          <textarea onchange="updateBudget(this.value)" rows="3" class="mt-1.5 w-full text-sm bg-white border border-slate-300 text-[#14244A] rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-[#E72175] leading-relaxed">${l.budgetNote}</textarea>
        </div>
      </div>
    </div>
  `;
}

function renderSkillTagsInline(){
  const wrap = document.getElementById('skill-tags');
  if(!wrap) return;
  const l = leader();
  wrap.innerHTML = l.skillTags.map((t,i) => `
    <span class="px-2.5 py-1 rounded-full text-[#14244A] text-xs font-medium flex items-center gap-1.5" style="background-color: ${BRAND[l.color].hex}25">
      ${dot(l.color)}${t}<button onclick="removeSkillTag(${i})" class="text-slate-400 hover:text-[#E72175]">✕</button>
    </span>`).join('') || `<p class="text-xs text-slate-400 italic">No tags yet.</p>`;
}

function addOKR(kind){
  const input = document.getElementById(kind+'-obj-input');
  const val = input.value.trim();
  if(!val) return;
  leader()[kind].push({objective: val, krs: []});
  renderStepContent();
}
function removeOKR(kind, oi){ leader()[kind].splice(oi,1); renderStepContent(); }
function addKR(kind, oi){
  const input = document.getElementById(`${kind}-kr-input-${oi}`);
  const val = input.value.trim();
  if(!val) return;
  leader()[kind][oi].krs.push(val);
  renderStepContent();
}
function removeKR(kind, oi, ki){ leader()[kind][oi].krs.splice(ki,1); renderStepContent(); }
function updateDirection(v){ leader().direction = v; }
function updateBudget(v){ leader().budgetNote = v; }
function addSkillTag(){
  const input = document.getElementById('skill-input');
  if(input.value.trim()){ leader().skillTags.push(input.value.trim()); input.value=''; renderSkillTagsInline(); }
}
function removeSkillTag(i){ leader().skillTags.splice(i,1); renderSkillTagsInline(); }

const boxLabel = {
  '1,3':'Rough Diamond', '2,3':'Future Star', '3,3':'Star',
  '1,2':'Inconsistent Player', '2,2':'Core Player', '3,2':'High Performer',
  '1,1':'Risk', '2,1':'Solid Performer', '3,1':'Trusted Professional'
};

function tplStep2(){

            </div>

          ` : ''}

      </div>

function wireStep2(){
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('dragstart', e => {
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', chip.dataset.id);
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    chip.addEventListener('click', () => { selectedEmployeeId = Number(chip.dataset.id); renderStepContent(); });
  });
  document.querySelectorAll('.cell-drop').forEach(cell => {
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const id = Number(e.dataTransfer.getData('text/plain'));
      const emp = leader().employees.find(x => x.id === id);
      if(emp){
        emp.perf = Number(cell.dataset.perf);
        emp.pot = Number(cell.dataset.pot);
        renderStepContent();
      }
    });
  });
}

function addEmployee(){
  const name = document.getElementById('emp-name').value.trim();
  const role = document.getElementById('emp-role').value.trim();
  if(!name || !role){ alert('Enter a name and role.'); return; }
  const l = leader();
  l.employees.push({
    id: l.nextEmployeeId++,
    name, role,
    critical: document.getElementById('emp-critical').value === 'true',
    perf: 2, pot: 2,
    flightRisk: document.getElementById('emp-risk').value,
    successor: document.getElementById('emp-successor').value
  });
  renderStepContent();
}
function removeEmployee(id){
  const l = leader();
  l.employees = l.employees.filter(e => e.id !== id);
  l.actionItems = l.actionItems.filter(a => a.empId !== id);
  if(selectedEmployeeId === id) selectedEmployeeId = null;
  renderStepContent();
  renderSummary();
}

function sendToSixB(empId){
  const l = leader();
  const e = l.employees.find(x => x.id === empId);
  if(!e) return;
  l.actionItems.push({
    id: l.nextActionId++,
    label: `${e.name} — ${e.role}`,
    rationale: e.successor==='None' ? 'No ready successor identified.' : 'High flight risk — retention/succession action needed.',
    lever: 'Bind',
    empId: e.id
  });
  currentStep = 3;
  renderStepTabs();
  renderStepContent();
  renderSummary();
}

  {key:'Build', desc:'Develop'},
  {key:'Borrow', desc:'Contractor'},
  {key:'Bound', desc:'Retain'},
  {key:'Bounce', desc:'Manage Out'},
  {key:'Bind', desc:'Succession'}
];

          </div>
          <div class="lever-col p-2 space-y-2 flex-1 overflow-y-auto max-h-[420px]">

function addActionItem(){
  const label = document.getElementById('newitem-label').value.trim();
  const rationale = document.getElementById('newitem-rationale').value.trim();
  const lever = document.getElementById('newitem-lever').value;
  if(!label){ alert('Enter a role or person.'); return; }
  const l = leader();
  l.actionItems.push({id: l.nextActionId++, label, rationale, lever});
  renderStepContent();
  renderSummary();
}
function removeActionItem(id){
  leader().actionItems = leader().actionItems.filter(a => a.id !== id);
  renderStepContent();
  renderSummary();
}
function setItemLever(id, lever){
  const item = leader().actionItems.find(a => a.id === id);
  if(item) item.lever = lever;
  renderStepContent();
  renderSummary();
}
